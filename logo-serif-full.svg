<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" fill="none">
  <defs>
    <linearGradient id="sf-grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- M-chart icon in purple pill -->
  <rect x="0" y="10" width="52" height="52" rx="14"
        fill="url(#sf-grad)"/>
  <svg x="12" y="22" width="28" height="28" viewBox="0 0 24 24" fill="none"
       stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="2,22 7.6,4 12,15 16.4,2 22,22"/>
  </svg>

  <!-- "Muses" in Fraunces serif -->
  <text x="68" y="52" font-family="'Fraunces',Georgia,serif"
        font-weight="600" font-size="42" fill="#f7f3ea" letter-spacing="-0.5">Muses</text>

  <!-- "EXCHANGE" small caps -->
  <text x="222" y="50" font-family="'Inter',-apple-system,sans-serif"
        font-weight="500" font-size="13" fill="rgba(247,243,234,0.66)" letter-spacing="3.5"
        text-transform="uppercase">EXCHANGE</text>
</svg>