<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="aGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="60%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#10D88B"/>
    </linearGradient>
    <linearGradient id="aBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a18"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    <radialGradient id="aGlow" cx="65%" cy="40%" r="45%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="aBlur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#aBg)"/>
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#aGlow)"/>
  <rect x="16" y="16" width="480" height="480" rx="108"
        stroke="#8B5CF6" stroke-opacity="0.1" stroke-width="1.5" fill="none"/>

  <!-- 5 bars: left = short music EQ, right = tall (ascending like a chart) -->
  <!-- Each bar has rounded caps and transitions from purple to green -->
  <g transform="translate(96, 0)">
    <!-- Bar heights represent both EQ and uptrend -->
    <!-- Bar 1: short -->
    <rect x="0" y="260" width="36" height="120" rx="18" fill="#6D28D9" opacity="0.85"/>
    <rect x="0" y="200" width="36" height="60" rx="18" fill="#6D28D9" opacity="0.35"/>

    <!-- Bar 2: medium-short -->
    <rect x="72" y="220" width="36" height="160" rx="18" fill="#8B5CF6" opacity="0.85"/>
    <rect x="72" y="170" width="36" height="50" rx="18" fill="#8B5CF6" opacity="0.3"/>

    <!-- Bar 3: medium (center) -->
    <rect x="144" y="180" width="36" height="200" rx="18" fill="#A78BFA" opacity="0.85"/>
    <rect x="144" y="140" width="36" height="40" rx="18" fill="#A78BFA" opacity="0.25"/>

    <!-- Bar 4: tall -->
    <rect x="216" y="140" width="36" height="240" rx="18" fill="#C4B5FD" opacity="0.9"/>
    <rect x="216" y="108" width="36" height="32" rx="18" fill="#C4B5FD" opacity="0.2"/>

    <!-- Bar 5: tallest (the breakout) -->
    <rect x="288" y="90" width="36" height="290" rx="18" fill="#10D88B" opacity="0.9"/>
    <!-- Glow on top of tallest -->
    <circle cx="306" cy="90" r="18" fill="#10D88B" opacity="0.15" filter="url(#aBlur)"/>
  </g>
</svg>