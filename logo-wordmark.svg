<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <defs>
    <linearGradient id="wGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="wGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Small M-chart icon -->
  <g transform="translate(8, 14)">
    <polyline points="4,68 20,18 36,48 52,12 68,68"
              stroke="url(#wGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
              fill="none" filter="url(#wGlow)"/>
    <circle cx="52" cy="12" r="3.5" fill="#A78BFA" opacity="0.9"/>
    <circle cx="20" cy="18" r="2.5" fill="#A78BFA" opacity="0.5"/>
  </g>

  <!-- MUSES text -->
  <text x="96" y="68" font-family="'Plus Jakarta Sans','Inter',system-ui,sans-serif"
        font-weight="800" font-size="64" fill="#F0ECF9" letter-spacing="-1">MUSES</text>
</svg>