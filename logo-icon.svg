<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="bBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e0a1a"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    <radialGradient id="bGlow" cx="50%" cy="38%" r="50%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="bLineGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="bDotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bBg)"/>
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bGlow)"/>

  <!-- Subtle baseline -->
  <line x1="70" y1="390" x2="442" y2="390" stroke="#8B5CF6" stroke-opacity="0.06" stroke-width="1.5"/>

  <!-- M as chart — wide glow layer -->
  <polyline points="85,390 180,125 256,285 332,95 427,390"
            stroke="#8B5CF6" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"
            fill="none" opacity="0.08" filter="url(#bLineGlow)"/>

  <!-- M as chart — medium glow -->
  <polyline points="85,390 180,125 256,285 332,95 427,390"
            stroke="url(#bGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"
            fill="none" opacity="0.3"/>

  <!-- M as chart — main stroke -->
  <polyline points="85,390 180,125 256,285 332,95 427,390"
            stroke="url(#bGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
            fill="none" filter="url(#bLineGlow)"/>

  <!-- Dot accents at peaks -->
  <circle cx="180" cy="125" r="4.5" fill="#A78BFA" opacity="0.6"/>

  <!-- Right peak is higher — the "breakout" -->
  <circle cx="332" cy="95" r="14" fill="#8B5CF6" opacity="0.12" filter="url(#bDotGlow)"/>
  <circle cx="332" cy="95" r="6" fill="#A78BFA" opacity="0.9"/>
  <circle cx="332" cy="95" r="2.5" fill="#F0ECF9" opacity="0.7"/>

  <!-- Valley dot -->
  <circle cx="256" cy="285" r="3.5" fill="#6D28D9" opacity="0.4"/>

  <!-- Base dots (subtle) -->
  <circle cx="85" cy="390" r="3" fill="#6D28D9" opacity="0.25"/>
  <circle cx="427" cy="390" r="3" fill="#6D28D9" opacity="0.25"/>

  <!-- Outer border -->
  <rect x="16" y="16" width="480" height="480" rx="108"
        stroke="#8B5CF6" stroke-opacity="0.08" stroke-width="1.5" fill="none"/>
</svg>