[build]
  publish = "."

# Serverless functions — the CMS GitHub OAuth proxy (auth.mjs + callback.mjs).
# Auto-deployed at /.netlify/functions/<name>. No build command needed.
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# ── Pretty URLs ─────────────────────────────────────────────────────────────
# Netlify automatically serves /page.html when a request comes in for /page,
# so all we need here is 301 redirects that collapse any *.html or /index.html
# hits to the canonical clean URL.
#
# Order matters: Netlify processes redirects top-to-bottom and stops at the
# first match. Specific rules (legacy space-encoded prototype URL, /index.html)
# must come BEFORE the generic "/*.html -> /:splat" rule.

[[redirects]]
  from = "/Muse - Exchange Prototype.html"
  to = "/exchange"
  status = 301
  force = true

[[redirects]]
  from = "/Muse%20-%20Exchange%20Prototype.html"
  to = "/exchange"
  status = 301
  force = true

[[redirects]]
  from = "/blog"
  to = "/news"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*"
  to = "/news/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# ── SPA fallbacks (M8) ──────────────────────────────────────────────────────
# The exchange app (exchange.html) owns client-side routes under /exchange/*
# (markets, artists directory, per-artist detail, per-genre pages) as well as
# the eight single-segment app routes at site root. Each of these is a 200
# rewrite — the URL in the address bar stays put, but Netlify serves
# exchange.html so the in-file router can pick up the path and render the
# right view. status = 200 (NOT 301) is critical: a 301 would rewrite the URL
# and the router would never see the deep-linked path.
#
# These rules sit AFTER the /*.html → /:splat canonicalizer so hits to
# /portfolio.html etc. still get 301'd to the clean URL first, then caught
# here. They sit BEFORE the default headers block (which isn't a redirect and
# therefore doesn't interact).

[[redirects]]
  from = "/exchange/*"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/orders"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/portfolio"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/swap"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/tournaments"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/tournaments/*"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/leaderboard"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/leagues"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/leagues/*"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/predictions"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/predictions/*"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/profile"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/settings"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/help"
  to = "/exchange.html"
  status = 200


# ── Always-revalidate the shared nav/footer/css ─────────────────────────────
# These files inject the global nav + footer markup. When we update them,
# users with cached copies see stale UI (e.g. old footer links) until they
# hard-refresh. no-cache forces the browser to check freshness before serving
# the cached copy. Small extra request per page load, big UX win.
[[headers]]
  for = "/muse-shared.*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/app/blog-embeds.*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/app/news-styles.css"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# WC2026 predictions pool: the results feed is rewritten every ~30 min by a
# GitHub Action during the tournament — browsers must always revalidate it.
[[headers]]
  for = "/app/wc2026-data.*"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# ── Sensible default headers ────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
