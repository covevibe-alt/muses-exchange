[build]
  publish = "."

# ── Pretty URLs ─────────────────────────────────────────────────────────────
# Netlify automatically serves /page.html when a request comes in for /page,
# so all we need here is 301 redirects that collapse any *.html or /index.html
# hits to the canonical clean URL.
#
# Order matters: Netlify processes redirects top-to-bottom and stops at the
# first match. Specific rules (legacy space-encoded prototype URL, /index.html)
# must come BEFORE the generic "/*.html -> /:splat" rule.

[[redirects]]
  from = "/Muse - Exchange Prototype.html"
  to = "/exchange"
  status = 301
  force = true

[[redirects]]
  from = "/Muse%20-%20Exchange%20Prototype.html"
  to = "/exchange"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/*.html"
  to = "/:splat"
  status = 301
  force = true

# ── SPA fallbacks (M8) ──────────────────────────────────────────────────────
# The exchange app (exchange.html) owns client-side routes under /exchange/*
# (markets, artists directory, per-artist detail, per-genre pages) as well as
# the eight single-segment app routes at site root. Each of these is a 200
# rewrite — the URL in the address bar stays put, but Netlify serves
# exchange.html so the in-file router can pick up the path and render the
# right view. status = 200 (NOT 301) is critical: a 301 would rewrite the URL
# and the router would never see the deep-linked path.
#
# These rules sit AFTER the /*.html → /:splat canonicalizer so hits to
# /portfolio.html etc. still get 301'd to the clean URL first, then caught
# here. They sit BEFORE the default headers block (which isn't a redirect and
# therefore doesn't interact).

[[redirects]]
  from = "/exchange/*"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/orders"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/portfolio"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/swap"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/tournaments"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/tournaments/*"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/leaderboard"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/profile"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/settings"
  to = "/exchange.html"
  status = 200

[[redirects]]
  from = "/help"
  to = "/exchange.html"
  status = 200

# ── Sensible default headers ────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
